services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindgarden
      POSTGRES_PASSWORD: mindgarden
      POSTGRES_DB: mindgarden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindgarden -d mindgarden"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    command: sh -c "npx prisma generate && npx prisma db push && npm run db:seed && npm run dev"
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
